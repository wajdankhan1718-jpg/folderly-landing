<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folderly — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#1B1B18; --paper:#FAF8F3; --paper-fold:#E8E2D4;
    --rust:#C9622B; --rust-dark:#9C481D; --sage:#5B6B57; --sage-light:#EDF0EA;
    --line:rgba(27,27,24,0.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
  .wrap{max-width:880px;margin:0 auto;padding:0 24px}
  nav{display:flex;align-items:center;justify-content:space-between;padding:20px 0;border-bottom:1px solid var(--line)}
  .logo{font-family:'Fraunces',serif;font-weight:600;font-size:19px;display:flex;align-items:center;gap:8px}
  .logo-mark{width:20px;height:20px;border:1.5px solid var(--ink);border-radius:3px;position:relative;flex-shrink:0}
  .logo-mark::after{content:'';position:absolute;top:5px;left:4px;right:4px;height:1.5px;background:var(--ink)}
  .logo-mark::before{content:'';position:absolute;bottom:5px;left:4px;width:7px;height:1.5px;background:var(--rust)}
  .nav-right{display:flex;align-items:center;gap:16px;font-size:13px;color:#5a5a52}
  .signout{font-family:'IBM Plex Mono',monospace;font-size:12px;border:1px solid var(--line);padding:7px 14px;border-radius:5px;cursor:pointer;background:#fff;transition:background .15s}
  .signout:hover{background:var(--paper-fold)}
  .page-head{padding:32px 0 24px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px}
  h1{font-family:'Fraunces',serif;font-weight:500;font-size:26px}
  .sub{font-size:13px;color:#8a8a82;margin-top:4px}
  .btn-primary{
    background:var(--rust);color:#fff;border:none;border-radius:5px;padding:10px 18px;
    font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s;
  }
  .btn-primary:hover{background:var(--rust-dark)}
  .empty-state{
    background:#fff;border:1px dashed var(--line);border-radius:8px;
    padding:48px 24px;text-align:center;color:#8a8a82;font-size:14px;
  }
  .client-list{display:flex;flex-direction:column;gap:10px;margin-bottom:40px}
  .client-card{
    background:#fff;border:1px solid var(--line);border-radius:7px;padding:18px 20px;
    display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  }
  .client-info h3{font-family:'Fraunces',serif;font-weight:500;font-size:16px;margin-bottom:3px}
  .client-info p{font-size:12px;color:#8a8a82}
  .status-pill{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:3px 10px;border-radius:20px;text-transform:uppercase}
  .status-pending{background:#faeeda;color:#854f0b}
  .status-completed{background:var(--sage-light);color:var(--sage)}
  .client-actions{display:flex;gap:8px;align-items:center}
  .link-btn{
    font-family:'IBM Plex Mono',monospace;font-size:12px;border:1px solid var(--line);
    background:var(--paper-fold);padding:7px 12px;border-radius:5px;cursor:pointer;transition:background .15s;
  }
  .link-btn:hover{background:var(--line)}

  /* Modal */
  .modal-overlay{
    display:none;position:fixed;top:0;left:0;right:0;bottom:0;
    background:rgba(27,27,24,0.4);align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .modal-overlay.show{display:flex}
  .modal{background:#fff;border-radius:8px;padding:28px;max-width:380px;width:100%}
  .modal h2{font-family:'Fraunces',serif;font-weight:500;font-size:19px;margin-bottom:18px}
  .form-group{margin-bottom:14px}
  label{display:block;font-size:12px;font-family:'IBM Plex Mono',monospace;color:#5a5a52;margin-bottom:6px}
  input{
    width:100%;padding:10px 13px;border:1.5px solid var(--line);border-radius:5px;
    font-size:14px;font-family:'Inter',sans-serif;color:var(--ink);outline:none;transition:border-color .15s;
  }
  input:focus{border-color:var(--rust)}
  .modal-actions{display:flex;gap:10px;margin-top:18px}
  .btn-cancel{flex:1;padding:10px;border:1px solid var(--line);background:#fff;border-radius:5px;cursor:pointer;font-size:13px}
  .btn-confirm{flex:1;padding:10px;border:none;background:var(--rust);color:#fff;border-radius:5px;cursor:pointer;font-size:13px;font-weight:500}
  .msg{margin-top:12px;padding:9px 12px;border-radius:5px;font-size:13px;display:none}
  .msg.error{background:#fbe9e7;color:#a32d2d;display:block}
  .msg.success{background:var(--sage-light);color:var(--sage);display:block}
  .loading{text-align:center;padding:60px 0;color:#8a8a82;font-size:14px}

  @media (max-width:560px){
    .client-card{flex-direction:column;align-items:flex-start}
  }
</style>
</head>
<body>

<div class="wrap">
  <nav>
    <div class="logo"><span class="logo-mark"></span>Folderly</div>
    <div class="nav-right">
      <span id="userEmail"></span>
      <button class="signout" onclick="signOut()">Sign out</button>
    </div>
  </nav>

  <div class="page-head">
    <div>
      <h1>Your clients</h1>
      <p class="sub">Send a link, get back a tidy folder — no more chasing</p>
    </div>
    <button class="btn-primary" onclick="openModal()">+ Add client</button>
  </div>

  <div id="loadingState" class="loading">Loading your clients...</div>
  <div id="emptyState" class="empty-state" style="display:none">
    No clients yet. Click "+ Add client" to generate your first onboarding link.
  </div>
  <div id="clientList" class="client-list"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Add a new client</h2>
    <form id="addClientForm">
      <div class="form-group">
        <label>Client name</label>
        <input type="text" id="clientName" placeholder="Ahmed Khan" required>
      </div>
      <div class="form-group">
        <label>Client email (optional)</label>
        <input type="email" id="clientEmail" placeholder="ahmed@example.com">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn-confirm">Generate link</button>
      </div>
      <div class="msg" id="addClientMsg"></div>
    </form>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://lcehnegebtrcxobyxnfl.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxjZWhuZWdlYnRyY3hvYnl4bmZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5MjQ4MDQsImV4cCI6MjA5NzUwMDgwNH0.sqgkFPdgluNTG2Hnt4UcDwSnCjTMa0CiHYL8-R0fEek';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentFreelancerId = null;

  // ---- Page load: check session and load freelancer profile ----
  async function init(){
    try{
      const { data: { session }, error: sessionError } = await supabaseClient.auth.getSession();
      if(sessionError || !session){
        window.location.href = 'login.html';
        return;
      }
      document.getElementById('userEmail').textContent = session.user.email;

      const sessionEmail = session.user.email.trim().toLowerCase();
      const { data: freelancerRows, error } = await supabaseClient
        .from('freelancers')
        .select('id, email')
        .ilike('email', sessionEmail);

      if(error || !freelancerRows || freelancerRows.length === 0){
        document.getElementById('loadingState').textContent = 'Could not find your profile. Please contact support.';
        return;
      }

      currentFreelancerId = freelancerRows[0].id;
      loadClients();
    }catch(fatalErr){
      document.getElementById('loadingState').textContent = 'Something went wrong loading your dashboard. Please refresh the page.';
      console.error('Fatal init error:', fatalErr);
    }
  }

  function generateUniqueLink(){
    return Math.random().toString(36).substring(2, 10);
  }

  async function loadClients(){
    document.getElementById('loadingState').style.display = 'block';
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('clientList').innerHTML = '';

    const { data: clients, error } = await supabaseClient
      .from('clients')
      .select('*')
      .eq('freelancer_id', currentFreelancerId)
      .order('created_at', { ascending: false });

    document.getElementById('loadingState').style.display = 'none';

    if(error){
      console.error('Could not load clients:', error.message);
      document.getElementById('emptyState').style.display = 'block';
      document.getElementById('emptyState').textContent = 'Could not load clients: ' + error.message;
      return;
    }

    if(!clients || clients.length === 0){
      document.getElementById('emptyState').style.display = 'block';
      return;
    }

    const list = document.getElementById('clientList');
    clients.forEach(client => {
      const card = document.createElement('div');
      card.className = 'client-card';
      const statusClass = client.status === 'completed' ? 'status-completed' : 'status-pending';
      card.innerHTML = `
        <div class="client-info">
          <h3>${client.client_name}</h3>
          <p>${client.client_email || 'No email provided'}</p>
        </div>
        <div class="client-actions">
          <span class="status-pill ${statusClass}">${client.status || 'pending'}</span>
          <button class="link-btn" onclick="copyLink('${client.unique_link}')">Copy link</button>
        </div>
      `;
      list.appendChild(card);
    });
  }

  function copyLink(uniqueLink){
    const fullLink = window.location.origin + window.location.pathname.replace('dashboard.html', '') + 'intake.html?link=' + uniqueLink;
    navigator.clipboard.writeText(fullLink).then(() => {
      alert('Link copied!\n\n' + fullLink);
    }).catch(() => {
      alert('Here is your link:\n\n' + fullLink);
    });
  }

  function openModal(){
    document.getElementById('modalOverlay').classList.add('show');
  }
  function closeModal(){
    document.getElementById('modalOverlay').classList.remove('show');
    document.getElementById('addClientForm').reset();
    document.getElementById('addClientMsg').className = 'msg';
  }

  document.getElementById('addClientForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const name = document.getElementById('clientName').value.trim();
    const email = document.getElementById('clientEmail').value.trim();
    const uniqueLink = generateUniqueLink();
    const button = e.target.querySelector('.btn-confirm');
    button.disabled = true;
    button.textContent = 'Creating...';

    const msgEl = document.getElementById('addClientMsg');

    if(!currentFreelancerId){
      msgEl.textContent = 'Could not verify your account. Please sign out and sign in again.';
      msgEl.className = 'msg error';
      button.disabled = false;
      button.textContent = 'Generate link';
      return;
    }

    try{
      const { error } = await supabaseClient
        .from('clients')
        .insert([{
          freelancer_id: currentFreelancerId,
          client_name: name,
          client_email: email || null,
          unique_link: uniqueLink,
          status: 'pending'
        }]);
      if(error) throw error;

      closeModal();
      loadClients();
    }catch(err){
      msgEl.textContent = err.message || 'Something went wrong. Please try again.';
      msgEl.className = 'msg error';
    }finally{
      button.disabled = false;
      button.textContent = 'Generate link';
    }
  });

  async function signOut(){
    await supabaseClient.auth.signOut();
    window.location.href = 'login.html';
  }

  init();
</script>

</body>
</html>
