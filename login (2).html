<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folderly — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#1B1B18; --paper:#FAF8F3; --paper-fold:#E8E2D4;
    --rust:#C9622B; --rust-dark:#9C481D; --sage:#5B6B57; --sage-light:#EDF0EA;
    --line:rgba(27,27,24,0.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--paper); color:var(--ink); font-family:'Inter',sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:24px; -webkit-font-smoothing:antialiased;
  }
  .logo{
    font-family:'Fraunces',serif;font-weight:600;font-size:21px;
    display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:32px;
  }
  .logo-mark{width:22px;height:22px;border:1.5px solid var(--ink);border-radius:3px;position:relative;flex-shrink:0}
  .logo-mark::after{content:'';position:absolute;top:5px;left:4px;right:4px;height:1.5px;background:var(--ink)}
  .logo-mark::before{content:'';position:absolute;bottom:5px;left:4px;width:8px;height:1.5px;background:var(--rust)}
  .card{
    background:#fff;border:1px solid var(--line);border-radius:8px;
    padding:36px 32px;max-width:380px;width:100%;
    box-shadow:0 2px 16px rgba(27,27,24,0.06);
  }
  .tabs{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;margin-bottom:24px}
  .tab{flex:1;padding:10px;text-align:center;font-size:13px;font-family:'IBM Plex Mono',monospace;cursor:pointer;background:var(--paper-fold);color:#5a5a52;transition:background .15s,color .15s}
  .tab.active{background:var(--ink);color:var(--paper)}
  h1{font-family:'Fraunces',serif;font-weight:500;font-size:22px;margin-bottom:6px;text-align:center}
  .sub{font-size:13px;color:#8a8a82;text-align:center;margin-bottom:24px}
  .form-group{margin-bottom:14px}
  label{display:block;font-size:12px;font-family:'IBM Plex Mono',monospace;color:#5a5a52;margin-bottom:6px}
  input{
    width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:5px;
    font-size:14px;font-family:'Inter',sans-serif;color:var(--ink);outline:none;
    transition:border-color .15s;
  }
  input:focus{border-color:var(--rust)}
  button.submit-btn{
    width:100%;padding:12px;background:var(--rust);color:#fff;border:none;border-radius:5px;
    font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;cursor:pointer;
    margin-top:8px;transition:background .15s;
  }
  button.submit-btn:hover{background:var(--rust-dark)}
  button.submit-btn:disabled{opacity:.5;cursor:not-allowed}
  .msg{
    margin-top:14px;padding:10px 12px;border-radius:5px;font-size:13px;display:none;
  }
  .msg.error{background:#fbe9e7;color:#a32d2d;display:block}
  .msg.success{background:var(--sage-light);color:var(--sage);display:block}
  .footer-note{font-size:12px;color:#8a8a82;text-align:center;margin-top:18px;font-family:'IBM Plex Mono',monospace}
</style>
</head>
<body>

<div>
  <div class="logo"><span class="logo-mark"></span>Folderly</div>
  <div class="card">
    <div class="tabs">
      <div class="tab active" id="tabLogin" onclick="switchTab('login')">Sign in</div>
      <div class="tab" id="tabSignup" onclick="switchTab('signup')">Create account</div>
    </div>

    <div id="loginView">
      <h1>Welcome back</h1>
      <p class="sub">Sign in to your freelancer dashboard</p>
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@studio.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" class="submit-btn">Sign in</button>
        <div class="msg" id="loginMsg"></div>
      </form>
    </div>

    <div id="signupView" style="display:none">
      <h1>Create your account</h1>
      <p class="sub">Start sending onboarding links to clients</p>
      <form id="signupForm">
        <div class="form-group">
          <label>Your name</label>
          <input type="text" id="signupName" placeholder="Maya Rodriguez" required>
        </div>
        <div class="form-group">
          <label>Business name (optional)</label>
          <input type="text" id="signupBusiness" placeholder="Maya Design Studio">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="you@studio.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="At least 6 characters" required minlength="6">
        </div>
        <button type="submit" class="submit-btn">Create account</button>
        <div class="msg" id="signupMsg"></div>
      </form>
    </div>

    <p class="footer-note">Folderly — onboarding without the chasing</p>
  </div>
</div>

<script>
  // ---- Supabase setup ----
  const SUPABASE_URL = 'https://lcehnegebtrcxobyxnfl.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxjZWhuZWdlYnRyY3hvYnl4bmZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5MjQ4MDQsImV4cCI6MjA5NzUwMDgwNH0.sqgkFPdgluNTG2Hnt4UcDwSnCjTMa0CiHYL8-R0fEek';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function switchTab(tab){
    const isLogin = tab === 'login';
    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabSignup').classList.toggle('active', !isLogin);
    document.getElementById('loginView').style.display = isLogin ? 'block' : 'none';
    document.getElementById('signupView').style.display = isLogin ? 'none' : 'block';
  }

  function showMsg(id, text, type){
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  // ---- Sign up ----
  document.getElementById('signupForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const name = document.getElementById('signupName').value.trim();
    const business = document.getElementById('signupBusiness').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const button = e.target.querySelector('button');
    button.disabled = true;
    button.textContent = 'Creating account...';

    try{
      // Step 1: create the auth user
      const { data, error } = await supabaseClient.auth.signUp({
        email: email,
        password: password
      });
      if(error) throw error;

      // Step 2: save extra profile info into the freelancers table
      const { error: profileError } = await supabaseClient
        .from('freelancers')
        .insert([{ email: email, name: name, business_name: business }]);
      if(profileError) throw profileError;

      showMsg('signupMsg', 'Account created! Check your email to confirm, then sign in.', 'success');
      e.target.reset();
    }catch(err){
      showMsg('signupMsg', err.message || 'Something went wrong. Please try again.', 'error');
    }finally{
      button.disabled = false;
      button.textContent = 'Create account';
    }
  });

  // ---- Log in ----
  document.getElementById('loginForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const button = e.target.querySelector('button');
    button.disabled = true;
    button.textContent = 'Signing in...';

    try{
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
      });
      if(error) throw error;

      showMsg('loginMsg', 'Signed in! Redirecting...', 'success');
      setTimeout(() => {
        window.location.href = 'dashboard-final.html';
      }, 800);
    }catch(err){
      showMsg('loginMsg', err.message || 'Invalid email or password.', 'error');
    }finally{
      button.disabled = false;
      button.textContent = 'Sign in';
    }
  });
</script>

</body>
</html>
